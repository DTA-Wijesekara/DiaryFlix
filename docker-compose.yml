services:

  # ── SQL Server 2022 (Linux) ────────────────────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_SA_PASSWORD}"
      MSSQL_PID: Express          # free Express edition
    ports:
      - "1433:1433"               # expose only for local tools (remove in prod)
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      # $$VAR → docker-compose outputs $VAR → shell expands from the container env
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  # ── Express API ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./server
    environment:
      NODE_ENV: production
      PORT: 5000
      # Point at the db service (Docker internal DNS)
      DB_SERVER: db
      DB_NAME: "${DB_NAME:-cinemadiary}"
      DB_TRUSTED: "false"        # use sa login, not Windows Auth
      DB_USER: sa
      DB_PASSWORD: "${DB_SA_PASSWORD}"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-7d}"
      # Allow requests from the frontend container (nginx proxies /api)
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost}"
      CORS_CREDENTIALS: "true"
      # Optional: seed an admin account on first boot
      SEED_ADMIN: "${SEED_ADMIN:-false}"
      SEED_ADMIN_EMAIL: "${SEED_ADMIN_EMAIL:-}"
      SEED_ADMIN_PASSWORD: "${SEED_ADMIN_PASSWORD:-}"
      SEED_ADMIN_NAME: "${SEED_ADMIN_NAME:-Admin}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── React frontend (nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the JS bundle at build time.
        # nginx proxies /api/* → backend:5000/api/* so this never needs changing.
        VITE_API_URL: /api
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqldata:
